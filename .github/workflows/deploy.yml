name: Deploy site

on:
  push:
    branches:
      - main
    paths:
      - 'reports/**'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
